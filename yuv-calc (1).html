<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>YUV Numbers — מחשבון</title>
<meta name="theme-color" content="#2D4A45">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="YUV Numbers">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="#" id="manifestLink">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #EDEDE9;
    --surface: rgba(253,250,244,0.85);
    --dark: #2D4A45;
    --dark2: #41605b;
    --olive: #535E3B;
    --olive-light: #6E7D52;
    --sage: #9CAD8B;
    --text: #3B3926;
    --muted: #6B6650;
    --border: rgba(197,185,163,0.45);
    --shadow: 0 4px 32px rgba(45,74,69,0.09);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -20%; right: -10%;
    width: 60vw; height: 60vw;
    background: radial-gradient(ellipse, rgba(83,94,59,0.07) 0%, transparent 65%);
    border-radius: 50%;
    pointer-events: none; z-index: 0;
    animation: orb 18s ease-in-out infinite;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -15%; left: -10%;
    width: 50vw; height: 50vw;
    background: radial-gradient(ellipse, rgba(45,74,69,0.07) 0%, transparent 65%);
    border-radius: 50%;
    pointer-events: none; z-index: 0;
    animation: orb 22s ease-in-out infinite reverse;
  }
  @keyframes orb {
    0%,100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(2%,3%) scale(1.04); }
  }

  /* HEADER */
  header {
    background: rgba(45,74,69,0.96);
    backdrop-filter: blur(20px);
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    position: sticky; top: 0; z-index: 100;
    border-bottom: 1px solid rgba(156,173,139,0.15);
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .yuv { font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; font-weight: 600; color: #EFF4EC; letter-spacing: 4px; }
  .tag { font-family: 'DM Mono', monospace; font-size: 0.55rem; color: var(--sage); letter-spacing: 3px; text-transform: uppercase; margin-top: 2px; }
  .today-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem; color: rgba(239,244,236,0.5);
    letter-spacing: 1px;
    background: rgba(156,173,139,0.1);
    border: 1px solid rgba(156,173,139,0.2);
    border-radius: 100px;
    padding: 4px 12px;
  }

  /* LAYOUT */
  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 20px 60px;
    position: relative; z-index: 1;
  }

  /* INPUT CARD */
  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 28px 28px 24px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(12px);
    margin-bottom: 28px;
  }
  .input-card h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem; font-weight: 600;
    color: var(--olive);
    margin-bottom: 20px;
    letter-spacing: 0.5px;
    text-align: center;
  }
  .fields-row {
    display: flex; gap: 10px; margin-bottom: 12px;
  }
  .field {
    flex: 1;
    display: flex; flex-direction: column; gap: 5px;
  }
  .field label {
    font-size: 0.65rem; font-weight: 500;
    color: var(--muted); letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .field input {
    background: rgba(237,237,233,0.7);
    border: 1px solid rgba(197,185,163,0.55);
    border-radius: 12px;
    padding: 11px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 1rem; color: var(--text);
    text-align: center; outline: none;
    transition: all 0.2s; width: 100%;
    -webkit-appearance: none;
  }
  .field input[type="text"] {
    font-family: 'Heebo', sans-serif;
    font-size: 0.92rem; text-align: right;
  }
  .field input:focus {
    border-color: var(--olive);
    background: rgba(255,255,255,0.9);
    box-shadow: 0 0 0 3px rgba(83,94,59,0.08);
  }
  .calc-btn {
    width: 100%; margin-top: 16px;
    background: linear-gradient(135deg, #2D4A45, #41605b, #535E3B);
    color: #EFF4EC; border: none; border-radius: 14px;
    padding: 14px; font-family: 'Heebo', sans-serif;
    font-size: 1rem; font-weight: 600; cursor: pointer;
    letter-spacing: 1px; transition: all 0.25s;
    position: relative; overflow: hidden;
  }
  .calc-btn::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.08), transparent 60%);
  }
  .calc-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(45,74,69,0.3); }
  .calc-btn:active { transform: none; }

  /* RESULTS */
  .results { display: none; animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1); }
  .results.show { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* SECTION */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 22px 24px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(12px);
  }
  .section-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem; font-weight: 400;
    color: var(--muted); letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(197,185,163,0.3);
  }

  /* NUMBER GRID */
  .num-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 12px;
  }
  .num-cell {
    background: rgba(237,237,233,0.5);
    border: 1px solid rgba(197,185,163,0.35);
    border-radius: 14px;
    padding: 14px 12px;
    text-align: center;
    transition: all 0.2s;
  }
  .num-cell:hover {
    background: rgba(228,232,218,0.7);
    border-color: rgba(110,125,82,0.3);
    transform: translateY(-1px);
  }
  .num-cell .n-label {
    font-size: 0.78rem; color: var(--muted);
    letter-spacing: 0.5px; margin-bottom: 6px;
    font-weight: 500;
  }
  .num-cell .n-val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.6rem; font-weight: 700;
    color: var(--olive); line-height: 1;
  }
  .num-cell .n-raw {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem; color: var(--muted);
    margin-top: 4px; opacity: 0.6;
  }
  .num-cell.highlight .n-val { color: var(--dark); }
  .num-cell.master .n-val { color: #8B5A2B; }
  .num-cell.master { border-color: rgba(139,90,43,0.2); background: rgba(253,248,240,0.7); }
  .num-cell.today-cell { border-color: rgba(110,125,82,0.4); background: rgba(228,232,218,0.8); }
  .num-cell.today-cell .n-val { color: var(--olive); }

  /* PEAKS TABLE */
  .peaks-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 14px;
  }
  .peak-cell {
    background: rgba(237,237,233,0.5);
    border: 1px solid rgba(197,185,163,0.35);
    border-radius: 12px;
    padding: 12px 10px;
    text-align: center;
  }
  .peak-cell.current-peak {
    background: linear-gradient(135deg, rgba(45,74,69,0.08), rgba(83,94,59,0.06));
    border-color: rgba(83,94,59,0.35);
  }
  .peak-cell .p-label { font-size: 0.62rem; color: var(--muted); margin-bottom: 4px; font-weight: 500; }
  .peak-cell .p-ages { font-family: 'DM Mono', monospace; font-size: 0.58rem; color: var(--muted); opacity: 0.6; margin-bottom: 6px; }
  .peak-cell .p-val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem; font-weight: 700; color: var(--olive);
  }
  .peak-cell.current-peak .p-val { color: var(--dark); }
  .peak-cell .p-now {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem; color: var(--sage);
    letter-spacing: 1px; margin-top: 4px;
  }

  /* TIMING ROW */
  .timing-row {
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .timing-cell {
    flex: 1; min-width: 100px;
    background: linear-gradient(135deg, rgba(45,74,69,0.06), rgba(83,94,59,0.04));
    border: 1px solid rgba(83,94,59,0.2);
    border-radius: 14px;
    padding: 14px 12px;
    text-align: center;
  }
  .timing-cell .t-label { font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
  .timing-cell .t-val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.4rem; font-weight: 700; color: var(--dark);
  }

  /* MAGIC SQUARE */
  .magic-square-wrap { overflow-x: auto; }
  .magic-square {
    display: inline-grid;
    grid-template-columns: repeat(9, 1fr);
    gap: 5px;
    min-width: 100%;
  }
  .ms-header {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem; color: var(--muted);
    text-align: center; padding: 6px 4px;
    font-weight: 400;
  }
  .ms-cell {
    background: rgba(237,237,233,0.6);
    border: 1px solid rgba(197,185,163,0.3);
    border-radius: 8px;
    padding: 8px 4px;
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem; font-weight: 600;
    color: var(--olive);
    min-width: 32px;
  }
  .ms-cell.ms-zero { color: rgba(107,102,80,0.3); }
  .ms-cell.ms-many { background: rgba(83,94,59,0.12); border-color: rgba(83,94,59,0.25); }
  .ms-row-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem; color: var(--muted);
    text-align: center; padding: 8px 4px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0.6;
  }

  /* NAMES ROW */
  .names-section { margin-top: 12px; }
  .name-row {
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .name-cell {
    flex: 1; min-width: 120px;
    background: rgba(237,237,233,0.5);
    border: 1px solid rgba(197,185,163,0.35);
    border-radius: 14px;
    padding: 14px 12px;
    text-align: center;
  }
  .name-cell .nc-label { font-size: 0.65rem; color: var(--muted); margin-bottom: 4px; font-weight: 500; }
  .name-cell .nc-name { font-size: 0.82rem; color: var(--text); margin-bottom: 6px; }
  .name-cell .nc-val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem; font-weight: 700; color: var(--olive);
  }
  .name-cell.master-name { border-color: rgba(139,90,43,0.25); background: rgba(253,248,240,0.7); }
  .name-cell.master-name .nc-val { color: #8B5A2B; }

  /* ERROR */
  .err { color: #8B5A2B; font-size: 0.82rem; text-align: center; padding: 8px 0; }

  @media (max-width: 600px) {
    .container { padding: 20px 14px 50px; }
    .num-grid { grid-template-columns: repeat(3, 1fr); }
    .peaks-grid { grid-template-columns: repeat(2, 1fr); }
    header { padding: 0 16px; }
    .input-card { padding: 20px 18px; }
  }
</style>
</head>

        <div class="magic-square" id="magicSquare"></div>
      </div>
    </div>

    <!-- NAMES -->
    <div class="section names-section" id="namesSection" style="display:none">
      <div class="section-title">מספרי שם</div>
      <div class="name-row" id="namesRow"></div>
    </div>

  </div>

  <!-- Written Map Section -->
  <div class="section" id="writtenMapSection" style="display:none">
    <div class="section-title">מפה כתובה ✦</div>
    <div id="mapHeader" style="margin-bottom:16px;padding:14px 16px;background:rgba(237,237,233,0.5);border-radius:12px;border:1px solid rgba(197,185,163,0.3)">
      <div style="font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--dark);font-weight:600" id="mapPersonName"></div>
      <div style="font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--muted);margin-top:4px" id="mapNumbers"></div>
    </div>
    <textarea id="mapText" dir="rtl"
      style="width:100%;min-height:400px;background:rgba(253,250,244,0.8);border:1px solid rgba(197,185,163,0.4);
      border-radius:14px;padding:16px;font-family:'Heebo',sans-serif;font-size:0.95rem;
      color:var(--text);line-height:1.9;resize:vertical;outline:none;direction:rtl;
      transition:border-color 0.2s;"
      placeholder="כתבי כאן את המפה המלאה...

שביל גורל:
יום לידה:
שנה אישית:
פסגה נוכחית:
אתגר נוכחי:

הערות:"
      onfocus="this.style.borderColor='var(--olive)'"
      onblur="this.style.borderColor='rgba(197,185,163,0.4)'"
    ></textarea>
    <div style="display:flex;gap:10px;margin-top:12px;flex-wrap:wrap">
      <button onclick="printMap()" style="flex:1;background:linear-gradient(135deg,#2D4A45,#41605b);
        color:#EFF4EC;border:none;border-radius:12px;padding:12px;font-family:'Heebo',sans-serif;
        font-size:0.88rem;font-weight:600;cursor:pointer;letter-spacing:0.5px">
        🖨 הדפסה / PDF
      </button>
      <button onclick="clearMap()" style="flex:1;background:transparent;
        border:1px solid rgba(197,185,163,0.5);color:var(--muted);border-radius:12px;padding:12px;
        font-family:'Heebo',sans-serif;font-size:0.88rem;cursor:pointer">
        נקה
      </button>
    </div>
  </div>
</div>

<script>
// ─── UTILS ──────────────────────────────────────────────────────────────
const MASTER = [11, 22, 33];

function reduce(n) {
  if (typeof n !== 'number' || isNaN(n)) return 0;
  n = Math.abs(Math.round(n));
  while (n > 9 && !MASTER.includes(n)) {
    n = String(n).split('').reduce((a, d) => a + parseInt(d), 0);
  }
  return n;
}

function sumDigits(n) {
  return String(Math.abs(Math.round(n))).split('').reduce((a, d) => a + parseInt(d), 0);
}

function isMaster(n) { return MASTER.includes(n); }

const HEB = {
  'א':1,'ב':2,'ג':3,'ד':4,'ה':5,'ו':6,'ז':7,'ח':8,'ט':9,
  'י':1,'כ':2,'ל':3,'מ':4,'נ':5,'ס':6,'ע':7,'פ':8,'צ':9,
  'ק':1,'ר':2,'ש':3,'ת':4,'ך':2,'ם':4,'ן':5,'ף':8,'ץ':9
};

function nameNum(s) {
  let sum = 0;
  for (const c of s.replace(/\s/g,'')) { if (HEB[c]) sum += HEB[c]; }
  return sum > 0 ? sum : null;
}

const MONTHS_HE = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני',
                   'יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

// ─── MAIN CALC ───────────────────────────────────────────────────────────
function calculate() {
  const d = parseInt(document.getElementById('day').value);
  const m = parseInt(document.getElementById('month').value);
  const y = parseInt(document.getElementById('year').value);
  const fn = document.getElementById('firstName').value.trim();
  const ln = document.getElementById('lastName').value.trim();
  const errEl = document.getElementById('errMsg');

  if (!d || !m || !y || y < 1900 || d > 31 || m > 12) {
    errEl.textContent = 'אנא מלאי יום, חודש ושנה תקינים 😊';
    errEl.style.display = 'block';
    return;
  }
  errEl.style.display = 'none';

  const today = new Date();
  const todayD = today.getDate();
  const todayM = today.getMonth() + 1;
  const todayY = today.getFullYear();
  const age = todayY - y - (todayM < m || (todayM === m && todayD < d) ? 1 : 0);

  // Personal year — last birthday year
  const lastBdayY = (todayM > m || (todayM === m && todayD >= d)) ? todayY : todayY - 1;
  const pyRaw = sumDigits(d) + sumDigits(m) + sumDigits(lastBdayY);
  const personalYear = reduce(pyRaw);

  // Hidden year — שנה נסתרת = שנה אישית + גיל מצומצם → צמצם
  const hiddenYear = reduce(personalYear + reduce(age));
  const lpRaw = sumDigits(d) + sumDigits(m) + sumDigits(y);
  const lifePath = reduce(lpRaw);

  // Birth day
  const birthDay = reduce(d);

  // Personal month (שנה אישית + חודש לוח נוכחי → צמצם)
  const pmRaw = personalYear + todayM;
  const personalMonth = reduce(pmRaw);

  // Personal day (חודש אישי + יום לוח נוכחי → צמצם)
  const pdRaw = personalMonth + todayD;
  const personalDay = reduce(pdRaw);

  // ─── PEAKS ───────────────────────────────────────────────────────
  // Formulas from course materials
  const p1raw = sumDigits(d) + sumDigits(m);
  const p1 = reduce(p1raw);

  const p2raw = sumDigits(d) + sumDigits(y);
  const p2 = reduce(p2raw);

  const p3raw = p1raw + p2raw;
  const p3 = reduce(p3raw);

  const p4raw = sumDigits(m) + sumDigits(y);
  const p4 = reduce(p4raw);

  // ─── CHALLENGES (absolute difference → reduce) ───────────────────
  const c1raw = Math.abs(sumDigits(d) - sumDigits(m));
  const c1 = reduce(c1raw);

  const c2raw = Math.abs(sumDigits(d) - sumDigits(y));
  const c2 = reduce(c2raw);

  const c3raw = Math.abs(c1 - c2);
  const c3 = reduce(c3raw);

  const c4raw = Math.abs(sumDigits(m) - sumDigits(y));
  const c4 = reduce(c4raw);

  // ─── HIDDEN PEAK & CHALLENGE ─────────────────────────────────────
  // Current peak/challenge
  let currentPeakIdx = 0; // 0-3
  const peakAges = {
    1: [[27,35],[36,44],[45,53],[54,120]],
    2: [[26,34],[35,43],[44,52],[53,120]],
    3: [[25,33],[34,42],[43,51],[52,120]],
    4: [[24,32],[33,41],[42,50],[51,120]],
    5: [[23,31],[32,40],[41,49],[50,120]],
    6: [[22,30],[31,39],[40,48],[49,120]],
    7: [[21,29],[30,38],[39,47],[48,120]],
    8: [[20,28],[29,37],[38,46],[47,120]],
    9: [[19,27],[28,36],[37,45],[46,120]],
  };
  const lp9 = lifePath === 11 ? 2 : lifePath === 22 ? 4 : lifePath === 33 ? 6 : lifePath;
  const ages = peakAges[lp9] || peakAges[9];
  for (let i = 0; i < ages.length; i++) {
    if (age >= ages[i][0] && age <= ages[i][1]) { currentPeakIdx = i; break; }
  }
  const peaks = [p1, p2, p3, p4];
  const challenges = [c1, c2, c3, c4];
  const currentPeak = peaks[currentPeakIdx];
  const currentChallenge = challenges[currentPeakIdx];

  // Hidden peak = peak + challenge (current)
  const hiddenPeak = reduce(currentPeak + currentChallenge);
  // Hidden challenge = challenge + life path
  const hiddenChallenge = reduce(currentChallenge + lifePath);

  // Year within peak (שנה בתוך הפסגה)
  const peakStartAge = ages[currentPeakIdx][0];
  const yearInPeak = age - peakStartAge + 1;

  // ─── MAGIC SQUARE ────────────────────────────────────────────────
  // Combine all digits from birthdate + full name
  let allNums = String(d).split('').map(Number)
    .concat(String(m).split('').map(Number))
    .concat(String(y).split('').map(Number));

  if (fn || ln) {
    for (const c of (fn + ln).replace(/\s/g,'')) {
      if (HEB[c]) allNums.push(HEB[c]);
    }
  }

  // Count occurrences of 1-9
  const counts = {};
  for (let i = 1; i <= 9; i++) counts[i] = 0;
  for (const n of allNums) { if (n >= 1 && n <= 9) counts[n]++; }

  // ─── NAMES ───────────────────────────────────────────────────────
  const fnRaw = fn ? nameNum(fn) : null;
  const fnNum = fnRaw ? reduce(fnRaw) : null;
  const fullNameRaw = (fn || ln) ? nameNum(fn + ln) : null;
  const fullNameNum = fullNameRaw ? reduce(fullNameRaw) : null;

  // ─── RENDER ──────────────────────────────────────────────────────
  renderCore({ lifePath, lpRaw, birthDay, personalYear, pyRaw, hiddenYear });
  renderTiming({ personalYear, personalMonth, pmRaw, personalDay, pdRaw,
                  currentPeak, currentChallenge, hiddenPeak, hiddenChallenge, yearInPeak, currentPeakIdx });
  renderMonthly({ d, m, y, personalYear, lastBdayY });
  renderPeaks({ peaks, challenges, ages, currentPeakIdx, lp9,
                hiddenPeak, hiddenChallenge });
  renderMagicSquare(counts);
  renderNames(fnNum, fnRaw, fn, fullNameNum, fullNameRaw);
  document.getElementById('results').className = 'results show';
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
  showWrittenMap(d, m, y, fn, ln, lifePath, birthDay, personalYear, hiddenYear, currentPeak, currentChallenge);
}

// ─── RENDER FUNCTIONS ────────────────────────────────────────────────────

function renderCore({ lifePath, lpRaw, birthDay, personalYear, pyRaw, hiddenYear }) {
  const grid = document.getElementById('coreGrid');
  const items = [
    { label: 'שביל גורל', val: lifePath, raw: lpRaw, cls: isMaster(lifePath) ? 'master' : 'highlight' },
    { label: 'יום לידה', val: birthDay, raw: null, cls: '' },
    { label: 'שנה אישית', val: personalYear, raw: pyRaw, cls: isMaster(personalYear) ? 'master' : 'today-cell' },
    { label: 'שנה נסתרת', val: hiddenYear, raw: null, cls: isMaster(hiddenYear) ? 'master' : '' },
  ];
  grid.innerHTML = items.map(it => `
    <div class="num-cell ${it.cls}">
      <div class="n-label">${it.label}</div>
      <div class="n-val">${it.val}</div>
      ${it.raw && it.raw !== it.val ? `<div class="n-raw">${it.raw}</div>` : ''}
    </div>
  `).join('');
}

function renderTiming({ personalYear, personalMonth, pmRaw, personalDay, pdRaw,
                         currentPeak, currentChallenge, hiddenPeak, hiddenChallenge, yearInPeak, currentPeakIdx }) {
  const row = document.getElementById('timingRow');
  const pNames = ['ראשונה','שנייה','שלישית','רביעית'];
  const items = [
    { label: 'שנה אישית', val: personalYear },
    { label: 'חודש אישי', val: personalMonth, raw: pmRaw },
    { label: 'יום אישי', val: personalDay, raw: pdRaw },
    { label: `פסגה ${pNames[currentPeakIdx]} — שנה ${yearInPeak}`, val: currentPeak },
    { label: `אתגר ${pNames[currentPeakIdx]}`, val: currentChallenge },
    { label: 'פסגה נסתרת', val: hiddenPeak },
    { label: 'אתגר נסתר', val: hiddenChallenge },
  ];
  row.innerHTML = items.map(it => `
    <div class="timing-cell">
      <div class="t-label">${it.label}</div>
      <div class="t-val">${it.val}</div>
    </div>
  `).join('');
}

function renderMonthly({ d, m, y, personalYear, lastBdayY }) {
  const today = new Date();
  const todayM = today.getMonth() + 1;
  // Show 12 months starting from birthday month of last bday year
  const months = [];
  for (let i = 0; i < 12; i++) {
    const calMonth = ((m - 1 + i) % 12) + 1;
    const pmRaw = personalYear + calMonth;
    const pm = reduce(pmRaw);
    const isNow = calMonth === todayM;
    months.push({ calMonth, pm, isNow });
  }
  const wrap = document.getElementById('monthlyTable');
  wrap.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px">
      ${months.map(mo => `
        <div style="background:${mo.isNow ? 'rgba(83,94,59,0.12)' : 'rgba(237,237,233,0.5)'};
          border:1px solid ${mo.isNow ? 'rgba(83,94,59,0.3)' : 'rgba(197,185,163,0.3)'};
          border-radius:12px;padding:10px 8px;text-align:center;">
          <div style="font-size:0.62rem;color:var(--muted);margin-bottom:4px;font-weight:500">${MONTHS_HE[mo.calMonth-1]}</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:700;color:var(--olive)">${mo.pm}</div>
          ${mo.isNow ? `<div style="font-family:'DM Mono',monospace;font-size:0.5rem;color:var(--sage);letter-spacing:1px;margin-top:3px">עכשיו</div>` : ''}
        </div>
      `).join('')}
    </div>
  `;
}

function renderPeaks({ peaks, challenges, ages, currentPeakIdx, lp9, hiddenPeak, hiddenChallenge }) {
  const pNames = ['ראשונה','שנייה','שלישית','רביעית'];
  
  // Show only current peak & challenge prominently
  const pg = document.getElementById('peaksGrid');
  pg.innerHTML = `
    <div class="peak-cell current-peak">
      <div class="p-label">פסגה ${pNames[currentPeakIdx]} — עכשיו</div>
      <div class="p-ages">גילאים ${ages[currentPeakIdx][0]}–${ages[currentPeakIdx][1]}</div>
      <div class="p-val">${peaks[currentPeakIdx]}</div>
    </div>
    <div class="peak-cell current-peak">
      <div class="p-label">אתגר ${pNames[currentPeakIdx]} — עכשיו</div>
      <div class="p-ages">&nbsp;</div>
      <div class="p-val">${challenges[currentPeakIdx]}</div>
    </div>
  `;

  // Show all peaks in a smaller summary row
  const cg = document.getElementById('challengesGrid');
  cg.innerHTML = `
    <div style="grid-column:1/-1;font-family:'DM Mono',monospace;font-size:0.58rem;
      color:var(--muted);letter-spacing:2px;text-transform:uppercase;padding:8px 4px 4px;opacity:0.5">
      כל הפסגות
    </div>
    ${peaks.map((p, i) => `
      <div class="peak-cell" style="opacity:${i === currentPeakIdx ? '1' : '0.4'}">
        <div class="p-label">פסגה ${pNames[i]}</div>
        <div class="p-ages">${ages[i][0]}–${ages[i][1]}</div>
        <div class="p-val" style="font-size:1.4rem">${p} / ${challenges[i]}</div>
      </div>
    `).join('')}
  `;

  const hg = document.getElementById('hiddenGrid');
  hg.innerHTML = `
    <div class="num-cell">
      <div class="n-label">פסגה נסתרת</div>
      <div class="n-val">${hiddenPeak}</div>
    </div>
    <div class="num-cell">
      <div class="n-label">אתגר נסתר</div>
      <div class="n-val">${hiddenChallenge}</div>
    </div>
  `;
}

function renderMagicSquare(counts) {
  const sq = document.getElementById('magicSquare');

  // Descriptions from course materials
  const EXCESS = {
    1: 'האגו עלול לנהל אותו, שיעורים מול דמות סמכותית, קושי בביטוי הרגש, נטייה לפעול מהשכל, תחושת בדידות ורצון לעשות הכל לבד.',
    2: 'לא יודע לשים את עצמו במקום ראשון, תחושות של חוסר מוטיבציה, הכל נראה קשה ובלתי אפשרי, חוסר פרופורציה בעולמות הרגש.',
    3: 'צורך גדול בפינוק וריגושים, צורך עז שיראו אותו ותחושת שייכות. כאשר יש עודף 3 ו-1 ביחד — יכול להעיד על נרקיסיזם.',
    4: 'תקיעות בחיים, ההיגיון גובר על הלב, מתקבעים על דברים, צדקנות יתר, קיבעון מחשבתי.',
    5: 'היפראקטיביות, נטייה למריבות ולשבור כלים, לוקח סיכונים בלי לחשוב, נטייה חזקה להתמכרויות, קושי בקבלת החלטות.',
    6: 'פרפקציוניזם יתר, חיפוש שלמות שיוצר תסכול, נפגע בקלות בכל מה שקשור לתא המשפחתי.',
    7: 'הזדהות יתר עם הסביבה עד איבוד גבולות, נטייה להתבודדות, חוסר חיבור לעולם הפיזי, ריחוף וניתוקים.',
    8: 'דומיננטיות יתר, חיפוש שליטה, רצון להוכיח שהוא הכי טוב, נוקשה ונטייה לאגרסיביות.',
    9: 'נדיבות יתר, עסוק רוב חייו בלהבין ולתת לאחרים, לפעמים נראה שבא לעולם רק בשביל אחרים.'
  };

  const MISSING = {
    1: 'תחושת הזהות העצמית פגומה, חוסר מודעות עצמית וחוסר ביטחון גדול. מקשה על האדם להיות מודע לכוח שיש לו.',
    2: 'קשה להבין את הצרכים הפנימיים והרגשות, קושי לבטא החוצה את הייחודיות, קשה ליצור אינטימיות ושיתופי פעולה.',
    3: 'יכול להעיד על ילדות לא פשוטה, קושי להיות מחובר לרגשות, לא רוצה להיות מרכז העניינים, תופס עצמו כ"לא יצירתי".',
    4: 'לא מרגיש איזון בחיים, מחפש יציבות וקרקע ולא מוצא, חוסר מימוש עצמי וחוסר רצון לפעול.',
    5: 'קשה לעשות שינויים בחיים, קשיים בתחום החברתי, קשה להסביר ולתקשר את עצמו החוצה, קשיים בנושא המיניות.',
    6: 'תלותיות יתר בקשר למשפחה וזוגיות, בחיפוש מתמיד אחר הרמוניה מבלי לדעת מה מחפש, מפזר אהבה אך לא מאפשר לעצמו לקבל בחזרה.',
    7: 'שיעור מול המילה אמונה, חסרים גם הגבולות, קושי לקבל ולהיצמד לגבולות, נטייה לדיכאון.',
    8: 'לא מצליח להגיע לסיפוק עמוק, קושי בעניינים של כסף ורכוש, חסר ידע כיצד להתנהל כלכלית, קושי למצוא מוטיבציה בקריירה.',
    9: 'קשה בכל הקשור לייעוד ושליחות, רוצה לממש את עצמו אבל מתקשה, נטייה לרצות להבין את העולם שמעבר.'
  };

  // Build visual grid
  let gridHtml = `<div style="display:grid;grid-template-columns:repeat(9,1fr);gap:6px;margin-bottom:20px">`;
  
  for (let n = 1; n <= 9; n++) {
    const cnt = counts[n] || 0;
    const isMissing = cnt === 0;
    const isExcess = cnt >= 3;
    const isNormal = cnt > 0 && cnt < 3;
    
    let bg, border, color, label;
    if (isMissing) {
      bg = 'rgba(139,90,43,0.06)'; border = 'rgba(139,90,43,0.25)'; color = '#8B5A2B';
      label = 'חסר';
    } else if (isExcess) {
      bg = 'rgba(83,94,59,0.12)'; border = 'rgba(83,94,59,0.35)'; color = 'var(--olive)';
      label = 'עודף';
    } else {
      bg = 'rgba(237,237,233,0.5)'; border = 'rgba(197,185,163,0.3)'; color = 'var(--text-muted)';
      label = '';
    }

    gridHtml += `
      <div style="background:${bg};border:1px solid ${border};border-radius:10px;
        padding:10px 4px;text-align:center;cursor:pointer"
        onclick="toggleDetail(${n})">
        <div style="font-size:0.62rem;color:${color};font-weight:600;margin-bottom:3px;
          font-family:'DM Mono',monospace;letter-spacing:0.5px">${n}</div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:1.6rem;
          font-weight:700;color:${color};line-height:1">${isMissing ? '—' : cnt}</div>
        ${label ? `<div style="font-size:0.5rem;color:${color};margin-top:3px;
          font-family:'DM Mono',monospace;letter-spacing:1px;opacity:0.8">${label}</div>` : ''}
      </div>`;
  }
  gridHtml += `</div>`;

  // Build detail cards for missing and excess only
  let missing = [], excess = [];
  for (let n = 1; n <= 9; n++) {
    const cnt = counts[n] || 0;
    if (cnt === 0) missing.push(n);
    if (cnt >= 3) excess.push(n);
  }

  let detailsHtml = '';

  if (missing.length > 0) {
    detailsHtml += `
      <div style="margin-bottom:16px">
        <div style="font-family:'DM Mono',monospace;font-size:0.65rem;color:#8B5A2B;
          letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;
          padding-bottom:8px;border-bottom:1px solid rgba(139,90,43,0.2)">
          ✦ חוסרים — מספרים שלא קיימים במפה
        </div>
        ${missing.map(n => `

}

function renderNames(fnNum, fnRaw, fn, fullNameNum, fullNameRaw) {
  const sec = document.getElementById('namesSection');
  const row = document.getElementById('namesRow');
  if (!fnNum && !fullNameNum) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  let html = '';
  if (fnNum) {
    const m = isMaster(fnNum);
    html += `<div class="name-cell ${m ? 'master-name' : ''}">
      <div class="nc-label">שם פרטי</div>
      <div class="nc-name">${fn}</div>
      <div class="nc-val">${fnNum}</div>
      ${fnRaw !== fnNum ? `<div class="n-raw" style="font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--muted);margin-top:3px;opacity:0.6">${fnRaw}</div>` : ''}
    </div>`;
  }
  if (fullNameNum) {
    const m = isMaster(fullNameNum);
    html += `<div class="name-cell ${m ? 'master-name' : ''}">
      <div class="nc-label">שם מלא</div>
      <div class="nc-name" style="font-size:0.75rem">תיקון שושלת</div>
      <div class="nc-val">${fullNameNum}</div>
    </div>`;
  }
  row.innerHTML = html;
}

function showWrittenMap(d, m, y, fn, ln, lifePath, birthDay, personalYear, hiddenYear, currentPeak, currentChallenge) {
  const sec = document.getElementById('writtenMapSection');
  sec.style.display = 'block';
  
  const name = [fn, ln].filter(Boolean).join(' ') || 'ללא שם';
  document.getElementById('mapPersonName').textContent = name;
  document.getElementById('mapNumbers').textContent = 
    `${d}.${m}.${y}  ·  שביל ${lifePath}  ·  יום לידה ${birthDay}  ·  שנה אישית ${personalYear}  ·  שנה נסתרת ${hiddenYear}  ·  פסגה ${currentPeak} / אתגר ${currentChallenge}`;
  
  // Auto-fill template if empty
  const ta = document.getElementById('mapText');
  if (!ta.value) {
    ta.value = `שביל גורל ${lifePath}:
  
יום לידה ${birthDay}:
  
שנה אישית ${personalYear} | שנה נסתרת ${hiddenYear}:
  
פסגה נוכחית ${currentPeak} | אתגר נוכחי ${currentChallenge}:
  
מספרי שם:
  
עודפים וחוסרים:
  
הערות:`;
  }
  sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function printMap() {
  const name = document.getElementById('mapPersonName').textContent;
  const nums = document.getElementById('mapNumbers').textContent;
  const text = document.getElementById('mapText').value;
  const w = window.open('', '_blank');
  w.document.write(`<!DOCTYPE html><html dir="rtl"><head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600&display=swap" rel="stylesheet">
    <style>
      body{font-family:'Heebo',sans-serif;max-width:700px;margin:40px auto;padding:0 20px;color:#3B3926;direction:rtl}
      h1{font-size:1.4rem;color:#2D4A45;margin-bottom:4px}
      .nums{font-size:0.75rem;color:#6B6650;margin-bottom:28px;letter-spacing:0.5px}
      pre{white-space:pre-wrap;line-height:2;font-family:'Heebo',sans-serif;font-size:0.95rem}
      @media print{body{margin:20px}}
    </style></head><body>
    <h1>${name}</h1>
    <div class="nums">${nums}</div>
    <pre>${text}</pre>
    <script>window.onload=()=>window.print()<\/script>
  </body></html>`);
  w.document.close();
}

function clearMap() {
  if (confirm('למחוק את כל הטקסט?')) {
    document.getElementById('mapText').value = '';
  }
}

function setTodayBadge() {
  const t = new Date();
  const d = t.getDate().toString().padStart(2,'0');
  const m = (t.getMonth()+1).toString().padStart(2,'0');
  const y = t.getFullYear();
  document.getElementById('todayBadge').textContent = `${d}.${m}.${y}`;
}
setTodayBadge();

const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
const url = URL.createObjectURL(blob);
document.getElementById('manifestLink').href = url;

// ─── SERVICE WORKER ──────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'yuv-v1';
    self.addEventListener('install', e => {
      e.waitUntil(
        caches.open(CACHE).then(c => c.addAll(['/']))
      );
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).catch(() => r))
      );
    });
  `;
  const swBlob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

// ─── INSTALL BANNER ──────────────────────────────────────────────────────
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').style.display = 'flex';
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById('installBanner').style.display = 'none';
    });
  }
}

// iOS detection — show manual instructions
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
const isStandalone = window.navigator.standalone;
if (isIOS && !isStandalone) {
  document.getElementById('iosBanner').style.display = 'flex';
}
